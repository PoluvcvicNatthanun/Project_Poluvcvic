<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMBLACK - เอาเป็นว่าเพลงนี้คือเพลงของเธอ</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>

#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:-1;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}


@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.15);
    }
}

/* Film Grain */

.grain{
    position:fixed;
    inset:0;
    opacity:.08;
    pointer-events:none;
    background-image:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
}

/* Main */

.container{
    position:relative;
    z-index:10;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Card */

.card{
    width:100%;
    max-width:700px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:25px;

    padding:30px;
    text-align:center;

    box-shadow:
    0 0 40px rgba(0,0,0,.4);
}

/* Album */

.album{
    width:220px;
    height:220px;

    border-radius:20px;

    object-fit:cover;

    margin:auto;

    animation:float 4s ease-in-out infinite;

    box-shadow:
    0 10px 30px rgba(0,0,0,.5);
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
}

h1{
    margin-top:25px;
    font-size:28px;
    color:#ffffff;
}

.subtitle{
    margin-top:8px;
    color:#d0d0d0;
    font-size:14px;
}

/* Quote */

.quote{
    margin:25px 0;
    font-size:15px;
    line-height:1.8;
    color:#eeeeee;
}

/* Spotify */

.spotify{
    margin-top:15px;
}

.spotify iframe{
    border-radius:15px;
}

/* Glow */

.glow{
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#c28e6a;
    filter:blur(180px);
    opacity:.15;
    z-index:-1;
}

</style>
</head>

<body>
<video autoplay muted loop playsinline id="bg-video">
    <source src="hook.mp4" type="video/mp4">
</video>
<div class="bg"></div>
<div class="grain"></div>

<div class="container">

    <div class="glow"></div>

    <div class="card">

        <img
        class="album"
        src="https://i.ytimg.com/vi/e9ZjFpXyoGA/sddefault.jpg?v=67938377"
        alt="Album Cover">

        <h1>เอาเป็นว่าเพลงนี้คือเพลงของเธอ</h1>

        <p class="subtitle">
            เพลงนี้อาจเป็นของนักร้อง
            แต่ความหมายทั้งหมดเป็นของเธอ
        </p>

        <div class="quote">
            "ไม่ว่าจะผ่านไปนานแค่ไหน
            เพลงนี้ก็ยังทำให้คิดถึงเธอเสมอ"
        </div>

        <div class="spotify">
            <iframe
            style="border-radius:12px"
            src="https://open.spotify.com/embed/track/3t7a68G6fiu1FtMdoLBhMU"
            width="100%"
            height="152"
            frameBorder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
            </iframe>
        </div>

    </div>

</div>

</body>
</html>
