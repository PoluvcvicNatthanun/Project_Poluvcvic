<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LoveTrack ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(
        135deg,
        #ff9a9e,
        #fad0c4,
        #fad0c4,
        #ffdde1
    );

    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;

    text-align:center;

    background:rgba(255,255,255,.25);
    backdrop-filter:blur(15px);

    padding:30px;
    border-radius:30px;

    box-shadow:0 8px 30px rgba(0,0,0,.15);
}

.photo{
    width:220px;
    height:220px;

    object-fit:cover;

    border-radius:50%;
    border:6px solid white;

    margin-bottom:20px;

    box-shadow:0 0 25px rgba(255,255,255,.8);
}

h1{
    color:white;
    font-size:2rem;
    margin-bottom:10px;
}

.love-date{
    color:white;
    margin-bottom:20px;
}

#timer{
    color:white;
    font-size:1.7rem;
    font-weight:bold;
    line-height:1.8;
}

.message{
    margin-top:20px;
    color:white;
    font-size:1rem;
}

/* หัวใจลอย */
.heart{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}
</style>
</head>
<body>

<!-- หัวใจลอย -->
<div class="heart" style="left:10%;font-size:30px;">❤️</div>
<div class="heart" style="left:30%;font-size:25px;animation-delay:1s;">💖</div>
<div class="heart" style="left:50%;font-size:40px;animation-delay:2s;">❤️</div>
<div class="heart" style="left:70%;font-size:28px;animation-delay:3s;">💕</div>
<div class="heart" style="left:90%;font-size:35px;animation-delay:4s;">❤️</div>

<div class="container">

    <img src="couple.jpg" class="photo" alt="รูปคู่">

    <h1>❤️ Our Journey ❤️</h1>

    <div class="love-date">
        เริ่มคบกันวันที่ 15 สิงหาคม 2025
    </div>

    <div id="timer"></div>

    <div class="message">
        Every moment with you is my favorite memory 💕
    </div>

</div>

<script>

const startDate = new Date("2025-08-15");

function updateTimer() {

    const now = new Date();

    let years = now.getFullYear() - startDate.getFullYear();
    let months = now.getMonth() - startDate.getMonth();
    let days = now.getDate() - startDate.getDate();

    if(days < 0){
        months--;

        const lastMonth = new Date(
            now.getFullYear(),
            now.getMonth(),
            0
        ).getDate();

        days += lastMonth;
    }

    if(months < 0){
        years--;
        months += 12;
    }

    document.getElementById("timer").innerHTML =
        `${years} ปี <br>
         ${months} เดือน <br>
         ${days} วัน`;
}

updateTimer();
setInterval(updateTimer,1000);

</script>

</body>
</html>
